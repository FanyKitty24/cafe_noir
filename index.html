<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <h1>Café Noir - Gourmet Visual</h1>
    <link rel="stylesheet" href="CSS/styles.css">
</head>
<body>

    <!-- Contenedor Principal del Menú -->
    <main class="menu-container">
        
        <!-- Sección: Cafés Clásicos -->
        <section class="menu-section">
            <h2>☕ Cafés Clásicos</h2>
            <div class="menu-item">
                <span class="item-name">Espresso Solo</span>
                <span class="item-price">$35</span>
            </div>
            <div class="menu-item">
                <span class="item-name">Americano Intenso</span>
                <span class="item-price">$40</span>
            </div>
            <div class="menu-item">
                <span class="item-name">Capuccino Cremoso</span>
                <span class="item-price">$55</span>
            </div>
        </section>

        <!-- Sección: Especialidades Frías -->
        <section class="menu-section">
            <h2>❄️ Especialidades Frías</h2>
            <div class="menu-item">
                <span class="item-name">Cold Brew Nitro</span>
                <span class="item-price">$60</span>
            </div>
            <div class="menu-item">
                <span class="item-name">Iced Latte Rosé</span>
                <span class="item-price">$65</span>
            </div>
        </section>

    </main>

    <!-- Pie de página / Botón de Acción -->
    <footer>
        <p>Visítanos en la esquina más oscura de la ciudad</p>
        <button class="btn-order">Ordenar Ahora</button>
    </footer>

</body>
</html>
